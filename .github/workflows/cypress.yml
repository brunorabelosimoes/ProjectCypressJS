name: Cypress Tests
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Cypress binary
        run: npx cypress install
      - name: Start app (adjust if needed)
        run: npm start &
      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 120000
      - name: Run Cypress (mochawesome)
        run: npx cypress run --reporter mochawesome --reporter-options reportDir=cypress/reports,overwrite=false,html=false,json=true
      - name: Merge reports
        run: npx mochawesome-merge cypress/reports/*.json > cypress/reports/report.json || true
      - name: Generate HTML report
        run: npx marge cypress/reports/report.json -f report -o cypress/reports/html || true
